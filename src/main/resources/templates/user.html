<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザー登録</title>
	<link rel="stylesheet" href="/css/style2.css">
</head>

<body>
	<header th:replace="~{header}"></header>
	<div class="user">
		<h1>新規登録</h1>
		

		<form action="/users/add" method="post">

			<ul th:if="${errorList}" class="error">
				<li th:each="error:${errorList}" th:text="${error}"></li>
			</ul>

			<div class="form-group">
				<label for="name" class="form-label">名前</label>
				<input type="text" name="name" class="form-control" placeholder="名前" th:value="${name}" required>
			</div>

			<div class="form-group">
				<label for="email" class="form-label">メールアドレス</label>
				<input type="text" name="email" class="form-control" placeholder="メールアドレス" th:value="${email}" required>
			</div>

			<div class="form-group">
				<label for="password" class="form-label">パスワード</label>
				<input type="password" name="password" class="form-control" placeholder="パスワード" th:value="${password}" required>
			</div>

			<div class="form-group">
				<label for="age" class="form-label">年齢</label>
				<input type="number" name="age" class="form-control" placeholder="年齢" th:value="${age}" required>
			</div>

			<div class="form-group">
				<label for="gender" class="form-label">性別</label>
				<select name="gender" class="form-control">
					<option value="0">選択してください</option>
					<option value="1">男</option>
					<option value="2">女</option>
				</select>
			</div>

				<button class="btn-login">登録</button>
		</form>
		<div class="forgot-password">
			<a href="/login">戻る</a>
		</div>
	</div>
	<footer th:replace="~{footer}"></footer>
</body>

</html>
